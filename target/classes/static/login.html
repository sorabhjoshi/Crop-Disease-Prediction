<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Crop Pest Predictor</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/style.css"/>
</head>

<body>

<div class="auth-wrap">
  <div class="auth-card">

    <!-- HEADER -->
    <h1>🌿 Crop Pest Predictor</h1>
    <div class="subtitle">Sign in to your account</div>

    <!-- ALERTS (UNCHANGED FUNCTION) -->
    <div id="msgBox" class="alert alert-success" style="display:none;"></div>
    <div id="errBox" class="alert alert-error" style="display:none;"></div>

    <!-- FORM (UNCHANGED) -->
    <form method="POST" action="/login">

      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username"
               placeholder="Enter your username"
               required autocomplete="username"/>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password"
               placeholder="Enter your password"
               required autocomplete="current-password"/>
      </div>

      <button type="submit" class="btn btn-primary btn-full">
        Sign In
      </button>

    </form>

    <hr class="divider"/>

    <p style="text-align:center; font-size:.9rem; margin-top:10px;">
      Don't have an account?
      <a href="/register.html" style="font-weight:600;">Create one</a>
    </p>

  </div>
</div>

<!-- JS (UNCHANGED) -->
<script>
(function() {
  const errBox = document.getElementById('errBox');
  const msgBox = document.getElementById('msgBox');
  const params = new URLSearchParams(window.location.search);

  if (params.get('error')) {
    errBox.textContent = '⚠ ' + decodeURIComponent(params.get('error'));
    errBox.style.display = 'block';
  }

  if (params.get('msg')) {
    msgBox.textContent = '✓ ' + decodeURIComponent(params.get('msg'));
    msgBox.style.display = 'block';
  }
})();
</script>

</body>
</html>
