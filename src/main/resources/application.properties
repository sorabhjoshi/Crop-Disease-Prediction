# =========================================================
# Crop Pest Predictor - Application Configuration
# =========================================================

# Server
server.port=8080
server.servlet.context-path=/

# DataSource (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/pest_predictor?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false



# Session
spring.session.store-type=none
server.servlet.session.timeout=30m

# Logging
logging.level.com.pestpredictor=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN

# Python API endpoint (Flask server for ML model)
python.api.url=http://localhost:5000
python.api.predict.endpoint=/predict

# Multipart
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
