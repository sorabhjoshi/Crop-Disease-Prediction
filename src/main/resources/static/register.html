<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — Crop Pest Predictor</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/style.css"/>
</head>

<body>

<div class="auth-wrap">
  <div class="auth-card">

    <h1>🌾 Create Account</h1>
    <div class="subtitle">Join Crop Pest Predictor</div>

    <div id="errBox" class="alert alert-error" style="display:none;"></div>

    <form method="POST" action="/register" id="regForm">

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="fullName" placeholder="John Doe" required/>
      </div>

      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username"
               required minlength="3" maxlength="50"
               pattern="[a-zA-Z0-9_]+"/>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required/>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" name="password" required minlength="6"/>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" required/>
      </div>

      <button type="submit" class="btn btn-primary btn-full">
        Create Account
      </button>

    </form>

    <hr class="divider"/>

    <p style="text-align:center;">
      Already have an account?
      <a href="/login.html" style="font-weight:600;">Sign in</a>
    </p>

  </div>
</div>

<script>
(function() {
  const params = new URLSearchParams(window.location.search);
  const errBox = document.getElementById('errBox');

  if (params.get('error')) {
    errBox.textContent = '⚠ ' + decodeURIComponent(params.get('error'));
    errBox.style.display = 'block';
  }

  document.getElementById('regForm').addEventListener('submit', function(e) {
    const pw = document.getElementById('password').value;
    const cpw = document.getElementById('confirmPassword').value;

    if (pw !== cpw) {
      e.preventDefault();
      errBox.textContent = '⚠ Passwords do not match';
      errBox.style.display = 'block';
      window.scrollTo(0,0);
    }
  });
})();
</script>

</body>
</html>
